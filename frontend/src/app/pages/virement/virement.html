<div class ="container">
    
    <a routerLink="/dashboard" class="btn">Retour au dashboard</a>
    <h1>Effectuer un virement</h1>


    <form [formGroup]="form" (ngSubmit)="submit()" class="form">
        <div class="form-group">
            <label for="compteSourceId">Compte source :</label>
            <select id="compteSourceId" formControlName="sourceId" class="form-control">
                <option value="">Sélectionnez un compte</option>
                <option *ngFor="let compte of mesComptes()" [value]="compte._id">
                    {{ compte.numero }} - {{ compte.solde | number:'1.2-2' }} {{ compte.devise }}
                </option>
            </select>
        </div>

        <div class="form-group">
            <label for="compteDestinationId">Numéro de compte destination :</label>
            <input type="text" id="compteDestinationId" formControlName="destinationId" class="form-control" placeholder="Entrez le numéro de compte" >
        </div>

        <div class="form-group">
            <label for="montant">Montant :</label>
            <input type="number" id="montant" formControlName="montant" class="form-control" placeholder="0.00" step="0.01">
            <small class="err" *ngIf="form.get('montant')?.touched && form.get('montant')?.value <= 0">Le montant doit être supérieur à 0</small>
        </div>

        <div class="form-group">
            <label for="libelle">Libellé - Oprtionnel :</label>
            <input type="text" id="libelle" formControlName="libelle" class="form-control">
            
        </div>

        <button type="submit" [disabled]="form.invalid || loading()" >
            {{ loading() ? 'Traitement...' : 'Effectuer le virement' }}
        </button>

        <p class="success" *ngIf="succes()">{{ succes() }}</p>
        <p class="err" *ngIf="error()">{{ error() }}</p>

    </form>

</div>
