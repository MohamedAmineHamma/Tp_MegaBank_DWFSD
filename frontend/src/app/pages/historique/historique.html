<div class="container">
    <h1>Historique des transactions</h1>

    <a routerLink="/dashboard" class="btn btn-primary mb-3">Retour aux dashboard</a>
    
    <table class="table">
        <thead>
            <tr>
                <th>Date</th>
                <th>Compte</th>
                 <th>Type</th>
                <th>Montant</th>
                <th>Libellé</th>
                <th>Solde</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let item of items()">
                <td>{{ item.createdAt }}</td>
                <td>{{ item.compte.numero }}</td>
                <td>{{ item.type }}</td>
                <td>{{ item.montant }}</td>
                <td>{{ item.libelle }}</td>
                <td>{{ item.soldeApres }}</td>
            </tr>
        </tbody>
    </table>

</div>
